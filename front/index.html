<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Santuario Axolotl</title>
    <meta name="description" content="Santuario Axolotl - conservación y refugio" />
    <style>
      :root{color-scheme:light;font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif}
      body{margin:0;background:#f4fbf8;color:#16362b}
      .container{max-width:1100px;margin:0 auto;padding:2rem}
      header{display:flex;justify-content:space-between;align-items:center;padding:1rem 0}
      .logo{display:flex;gap:1rem;align-items:center}
      .logo .emoji{background:#2f8f6b;color:#fff;border-radius:50%;width:44px;height:44px;display:grid;place-items:center}
      nav a{margin-left:1rem;color:#1f5a40;text-decoration:none;font-weight:600}
      .hero{display:grid;grid-template-columns:1fr 420px;gap:2rem;background:#fff;padding:2rem;border-radius:16px;box-shadow:0 12px 30px rgba(18,51,42,0.06)}
      img{max-width:100%;height:auto;border-radius:12px}
      .grid{display:grid;gap:1rem}
      .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:1rem}
      .card{background:#fff;padding:1rem;border-radius:12px;box-shadow:0 8px 20px rgba(18,51,42,0.06)}
      .video-wrapper, #leaflet-map{border-radius:12px;overflow:hidden;box-shadow:0 8px 20px rgba(18,51,42,0.06);background:#fff}
      table{width:100%;border-collapse:collapse}
      table th,table td{padding:.6rem;border:1px solid #e6efe9}
      form{display:grid;gap:.75rem}
      input,textarea,select{padding:.6rem;border:1px solid #dfeee1;border-radius:8px;width:100%}
      .button{background:#2f8f6b;color:#fff;padding:.6rem 1rem;border-radius:12px;border:0;font-weight:700}
      footer{margin-top:2rem;padding:1.5rem 0;border-top:1px solid rgba(18,51,42,0.06);display:flex;justify-content:space-between}
      @media(max-width:800px){.hero{grid-template-columns:1fr}.logo p{display:none};nav{display:none}}
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <style>
          :root{color-scheme:light;font-family:Inter,Segoe UI, Tahoma, Geneva, Verdana, sans-serif}
          *{box-sizing:border-box}
          html,body{height:100%;margin:0;background:#f4fbf8;color:#16362b;scroll-behavior:smooth}

          /* Header (full-width, fixed) */
          .site-header{position:fixed;left:0;top:0;width:100%;height:72px;background:rgba(255,255,255,0.85);backdrop-filter:blur(6px);box-shadow:0 6px 24px rgba(8,30,20,0.06);z-index:1000;display:flex;align-items:center}
          .site-header .container{display:flex;justify-content:space-between;align-items:center;padding:0 1rem}
          .logo{display:flex;gap:1rem;align-items:center}
          .logo .emoji{background:#2f8f6b;color:#fff;border-radius:50%;width:48px;height:48px;display:grid;place-items:center;font-size:20px}
          nav a{margin-left:1rem;color:#1f5a40;text-decoration:none;font-weight:600;position:relative;padding:.5rem .25rem}
          nav a::after{content:'';position:absolute;left:0;right:0;bottom:6px;height:2px;background:transparent;transition:all .25s ease}
          nav a:hover::after{background:linear-gradient(90deg,#2f8f6b,#4fbf8f)}

          /* Page container with offset for fixed header */
          .container{max-width:1100px;margin:0 auto;padding:2rem}
          main.container{padding-top:92px}

          /* Hero and content */
          .hero{display:grid;grid-template-columns:1fr 420px;gap:2rem;background:#fff;padding:2rem;border-radius:16px;box-shadow:0 12px 30px rgba(18,51,42,0.06);align-items:center}
          img{max-width:100%;height:auto;border-radius:12px}
          .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:1rem}
          .card{background:#fff;padding:1rem;border-radius:12px;box-shadow:0 8px 20px rgba(18,51,42,0.06);transition:transform .28s cubic-bezier(.2,.9,.2,1),box-shadow .28s}
          .card:hover{transform:translateY(-8px);box-shadow:0 18px 40px rgba(18,51,42,0.12)}
          .video-wrapper, #leaflet-map{border-radius:12px;overflow:hidden;box-shadow:0 8px 20px rgba(18,51,42,0.06);background:#fff}

          table{width:100%;border-collapse:collapse}
          table th,table td{padding:.6rem;border:1px solid #e6efe9}
          form{display:grid;gap:.75rem}
          input,textarea,select{padding:.6rem;border:1px solid #dfeee1;border-radius:8px;width:100%;transition:box-shadow .18s}
          input:focus,textarea:focus,select:focus{outline:none;box-shadow:0 6px 20px rgba(47,143,107,0.12)}
          .button{background:#2f8f6b;color:#fff;padding:.6rem 1rem;border-radius:12px;border:0;font-weight:700}

          footer{margin-top:2rem;padding:1.5rem 0;border-top:1px solid rgba(18,51,42,0.06);display:flex;justify-content:space-between}

          /* Section reveal animation */
          .section{opacity:0;transform:translateY(12px);animation:fadeIn .6s ease forwards}
          @keyframes fadeIn{to{opacity:1;transform:none}}

          /* Top spacing for content on small screens */
          @media(max-width:900px){.hero{grid-template-columns:1fr}.site-header .container{padding:0 0.75rem}.site-header nav{display:none}}
        </style>
          <iframe width="100%" height="420" src="https://www.youtube.com/embed/ScMzIvxBSi4" title="Video" frameborder="0" allowfullscreen></iframe>
        </div>
      </section>

      <section id="testimonios" style="margin-top:1.5rem">
        <h2>Testimonios</h2>
        <div class="cards">
          <div class="card">“El refugio es hermoso.”<br><strong>— Visitante</strong></div>
          <div class="card">“Apoyar al refugio fue muy gratificante.”<br><strong>— Donante</strong></div>
        </div>
      </section>

      <section id="mapa" style="margin-top:1.5rem">
        <h2>Mapa</h2>
        <div id="leaflet-map" style="height:420px"></div>
      </section>

      <section id="tabla-ejemplo" style="margin-top:1.5rem">
        <body>
          <header class="site-header">
            <div class="container">
              <div class="logo">
                <div class="emoji">🦎</div>
                <div>
                  <div class="eyebrow">Santuario Axolotl</div>
                  <strong>Conservación y refugio</strong>
                </div>
              </div>
              <nav>
                <a href="#productos">Productos</a>
                <a href="#video">Video</a>
                <a href="#testimonios">Testimonios</a>
                <a href="#mapa">Mapa</a>
                <a href="#formulario">Contacto</a>
              </nav>
            </div>
          </header>

          <main class="container" id="root"></main>
      </section>
